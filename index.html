<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Funcionários</title>
  <style>
    body {
      font-family: Arial;
      margin: 20px;
      text-align: center;
    }

    input, button {
      margin: 5px;
      padding: 8px;
    }

    .topo {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      text-align: left;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    details {
      margin-top: 20px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

  <h1>Cadastro de Funcionários</h1>

  <!-- Barra de pesquisa centralizada -->
  <div class="topo">
    <input type="text" id="busca" placeholder="Pesquisar funcionário..." oninput="buscar()">
  </div>

  <div class="container">
    <!-- Formulário com validação real -->
    <form onsubmit="cadastrar(event)">
      <input type="text" id="nome" placeholder="Nome" required><br>
      <input type="email" id="email" placeholder="Email válido" required><br>
      <input type="text" id="cpf" placeholder="CPF" required><br>
      <button type="submit">Cadastrar</button>
    </form>

    <!-- Lista colapsável -->
    <details open>
      <summary><strong>Funcionários cadastrados</strong></summary>
      <div id="lista">Carregando funcionários...</div>
    </details>
  </div>

<script>
  // Link da sua implantação do Google Apps Script
  const URL_PLANILHA = "https://script.google.com/macros/s/AKfycbzRft9mi4Q9uKytaZi-oui5Rkn1ztkgeKkKv4YPHP3JM_EXwJk10bESNFl5YgYlzpNY/exec";

  // Função para buscar os dados direto da Planilha Google
  function carregarDadosDaPlanilha() {
    let div = document.getElementById("lista");

    fetch(URL_PLANILHA)
      .then(response => response.json())
      .then(dados => {
        mostrar(dados);
        // Atualiza a busca local rápida
        localStorage.setItem("funcionarios", JSON.stringify(dados));
      })
      .catch(error => {
        console.error("Erro ao buscar dados online:", error);
        // Se der erro ou estiver vazio, mostra o que tem guardado no PC
        let locais = JSON.parse(localStorage.getItem("funcionarios")) || [];
        mostrar(locais);
      });
  }

  function cadastrar(event) {
    event.preventDefault();

    let nome = document.getElementById("nome").value;
    let email = document.getElementById("email").value;
    let cpf = document.getElementById("cpf").value;

    // Organiza os dados para envio simplificado via URL
    let urlComParametros = `${URL_PLANILHA}?nome=${encodeURIComponent(nome)}&email=${encodeURIComponent(email)}&cpf=${encodeURIComponent(cpf)}`;

    // Envia os dados com segurança total contra erros de CORS
    fetch(urlComParametros, {
      method: "POST",
      mode: "no-cors"
    })
    .then(() => {
      alert("Cadastro enviado! Verifique sua planilha.");
      event.target.reset();
      // Aguarda 2 segundos para o Google processar a inserção antes de recarregar a lista
      setTimeout(carregarDadosDaPlanilha, 2000); 
    })
    .catch(error => {
      console.error("Erro na requisição:", error);
      alert("Houve um problema ao enviar o cadastro.");
    });
  }

  function mostrar(lista) {
    let div = document.getElementById("lista");
    div.innerHTML = "";

    if (!lista || lista.length === 0) {
      div.innerHTML = "<p style='color: #888;'>Nenhum funcionário cadastrado ou planilha vazia.</p>";
      return;
    }

    lista.forEach(f => {
      div.innerHTML += `
        <div class="card">
          <strong>Nome:</strong> ${f.nome || "Não informado"}<br>
          <strong>Email:</strong> ${f.email || "Não informado"}<br>
          <strong>CPF:</strong> ${f.cpf || "Não informado"}
        </div>
      `;
    });
  }

  function buscar() {
    let texto = document.getElementById("busca").value.toLowerCase();
    let funcionarios = JSON.parse(localStorage.getItem("funcionarios")) || [];

    let filtrados = funcionarios.filter(f =>
      (f.nome && f.nome.toLowerCase().includes(texto)) ||
      (f.email && f.email.toLowerCase().includes(texto)) ||
      (f.cpf && f.cpf.includes(texto))
    );

    mostrar(filtrados);
  }

  // Inicializa chamando a planilha ao abrir a página
  carregarDadosDaPlanilha();
</script>

<footer>
  <p>&copy; 2026 - Mateus Filipe 202.</p>
</footer>

</body>
</html>
