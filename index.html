<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Funcionários</title>
  <style>
    body {
      font-family: Arial;
      margin: 20px;
      text-align: center;
    }

    input, button {
      margin: 5px;
      padding: 8px;
    }

    .topo {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      text-align: left;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    details {
      margin-top: 20px;
    }

footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: #888;
        }
  </style>
</head>
<body>

  <h1>Cadastro de Funcionários</h1>

  <!-- Barra de pesquisa centralizada -->
  <div class="topo">
    <input type="text" id="busca" placeholder="Pesquisar funcionário..." oninput="buscar()">
  </div>

  <div class="container">
    <!-- Formulário com validaação real -->
    <form onsubmit="cadastrar(event)">
      <input type="text" id="nome" placeholder="Nome" required><br>
      <input type="email" id="email" placeholder="Email válido" required><br>
      <input type="text" id="cpf" placeholder="CPF" required><br>
      <button type="submit">Cadastrar</button>
    </form>

    <!-- Lista colapsável -->
    <details>
      <summary><strong>Funcionários cadastrados</strong></summary>
      <div id="lista"></div>
    </details>
  </div>

<script>
  // COLE AQUI A URL DO SEU WEB APP ATUALIZADO (PASSO 4 ACIMA)
  const URL_PLANILHA = "SUA_URL_DO_WEB_APP_AQUI";

  // Função para buscar dados em tempo real direto da Planilha Google
  function carregarDadosDaPlanilha() {
    let div = document.getElementById("lista");
    div.innerHTML = "<p>Carregando funcionários registrados...</p>";

    fetch(URL_PLANILHA)
      .then(response => response.json())
      .then(dados => {
        mostrar(dados);
        // Salva uma cópia local por segurança (opcional)
        localStorage.setItem("funcionarios", JSON.stringify(dados));
      })
      .catch(error => {
        console.error("Erro ao buscar dados online:", error);
        // Se a internet falhar, tenta carregar o histórico local do PC
        let locais = JSON.parse(localStorage.getItem("funcionarios")) || [];
        mostrar(locais);
      });
  }

  function cadastrar(event) {
    event.preventDefault();

    let nome = document.getElementById("nome").value;
    let email = document.getElementById("email").value;
    let cpf = document.getElementById("cpf").value;

    // Envia em tempo real para a nuvem (Planilha)
    fetch(URL_PLANILHA, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ nome, email, cpf })
    })
    .then(() => {
      alert("Funcionário cadastrado com sucesso na nuvem!");
      event.target.reset();
      // Atualiza a lista buscando os novos dados inseridos
      setTimeout(carregarDadosDaPlanilha, 1500); 
    })
    .catch(error => {
      console.error("Erro ao enviar dados:", error);
      alert("Erro ao conectar com a planilha.");
    });
  }

  function mostrar(lista) {
    let div = document.getElementById("lista");
    div.innerHTML = "";

    if (lista.length === 0) {
      div.innerHTML = "<p style='color: #888;'>Nenhum funcionário registrado.</p>";
      return;
    }

    lista.forEach(f => {
      div.innerHTML += `
        <div class="card">
          <strong>Nome:</strong> ${f.nome}<br>
          <strong>Email:</strong> ${f.email}<br>
          <strong>CPF:</strong> ${f.cpf}
        </div>
      `;
    });
  }

  function buscar() {
    let texto = document.getElementById("busca").value.toLowerCase();
    // Para a busca dinâmica funcionar instantaneamente, lemos o cache local rápido
    let funcionarios = JSON.parse(localStorage.getItem("funcionarios")) || [];

    let filtrados = funcionarios.filter(f =>
      f.nome.toLowerCase().includes(texto) ||
      f.email.toLowerCase().includes(texto) ||
      f.cpf.includes(texto)
    );

    mostrar(filtrados);
  }

  // Quando o site abre, ele puxa os registros atualizados da planilha
  carregarDadosDaPlanilha();
</script>

<footer>
        <p>&copy; 2026 - Mateus Filipe 202.</p>
    </footer>

</body>
</html>
