<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Funcionários</title>
  <style>
    body {
      font-family: Arial;
      margin: 20px;
      text-align: center;
    }

    input, button {
      margin: 5px;
      padding: 8px;
    }

    .topo {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      text-align: left;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    details {
      margin-top: 20px;
    }

footer {
            text-align: center;
            padding: 20px;
            font-size: 14px;
            color: #888;
        }
  </style>
</head>
<body>

  <h1>Cadastro de Funcionários</h1>

  <!-- Barra de pesquisa centralizada -->
  <div class="topo">
    <input type="text" id="busca" placeholder="Pesquisar funcionário..." oninput="buscar()">
  </div>

  <div class="container">
    <!-- Formulário com validaação real -->
    <form onsubmit="cadastrar(event)">
      <input type="text" id="nome" placeholder="Nome" required><br>
      <input type="email" id="email" placeholder="Email válido" required><br>
      <input type="text" id="cpf" placeholder="CPF" required><br>
      <button type="submit">Cadastrar</button>
    </form>

    <!-- Lista colapsável -->
    <details>
      <summary><strong>Funcionários cadastrados</strong></summary>
      <div id="lista"></div>
    </details>
  </div>

<script>
  function pegarFuncionarios() {
    return JSON.parse(localStorage.getItem("funcionarios")) || [];
  }

  function salvarFuncionarios(lista) {
    localStorage.setItem("funcionarios", JSON.stringify(lista));
  }

  function cadastrar(event) {
    event.preventDefault();

    let nome = document.getElementById("nome").value;
    let email = document.getElementById("email").value;
    let cpf = document.getElementById("cpf").value;

    let funcionarios = pegarFuncionarios();

    funcionarios.push({ nome, email, cpf });

    salvarFuncionarios(funcionarios);

    alert("Funcionário cadastrado!");

    event.target.reset();

    mostrar(funcionarios);
  }

  function mostrar(lista) {
    let div = document.getElementById("lista");
    div.innerHTML = "";

    lista.forEach(f => {
      div.innerHTML += `
        <div class="card">
          <strong>Nome:</strong> ${f.nome}<br>
          <strong>Email:</strong> ${f.email}<br>
          <strong>CPF:</strong> ${f.cpf}
        </div>
      `;
    });
  }

  function buscar() {
    let texto = document.getElementById("busca").value.toLowerCase();
    let funcionarios = pegarFuncionarios();

    let filtrados = funcionarios.filter(f =>
      f.nome.toLowerCase().includes(texto) ||
      f.email.toLowerCase().includes(texto) ||
      f.cpf.includes(texto)
    );

    mostrar(filtrados);
  }

  mostrar(pegarFuncionarios());
</script>

<footer>
        <p>&copy; 2026 - Mateus Filipe 202.</p>
    </footer>

</body>
</html>
