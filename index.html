<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Funcionários</title>
  <style>
    body {
      font-family: Arial;
      margin: 20px;
      text-align: center;
    }

    input, button {
      margin: 5px;
      padding: 8px;
    }

    .topo {
      display: flex;
      justify-content: center;
      margin-bottom: 20px;
    }

    .card {
      border: 1px solid #ccc;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      text-align: left;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    details {
      margin-top: 20px;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #888;
    }
  </style>
</head>
<body>

  <h1>Cadastro de Funcionários</h1>

  <!-- Barra de pesquisa centralizada -->
  <div class="topo">
    <input type="text" id="busca" placeholder="Pesquisar funcionário..." oninput="buscar()">
  </div>

  <div class="container">
    <!-- Formulário com validação real -->
    <form onsubmit="cadastrar(event)">
      <input type="text" id="nome" placeholder="Nome" required><br>
      <input type="email" id="email" placeholder="Email válido" required><br>
      <input type="text" id="cpf" placeholder="CPF" required><br>
      <button type="submit">Cadastrar</button>
    </form>

    <!-- Lista colapsável -->
    <details open>
      <summary><strong>Funcionários cadastrados</strong></summary>
      <div id="lista">Carregando funcionários...</div>
    </details>
  </div>

<script>
  // Cole aqui a nova URL gerada após criar a "Nova versão" no Apps Script
  const URL_PLANILHA = "https://script.google.com/macros/s/AKfycbx3Hd1OCANZSSvsjcfy2Hqfh0YW-grrrqY1zg9pxz8YpYvDj5_xS_LwhqtODLehUlwI9w/exec";

  function carregarDadosDaPlanilha() {
    let div = document.getElementById("lista");

    fetch(URL_PLANILHA)
      .then(response => response.json())
      .then(dados => {
        mostrar(dados);
        localStorage.setItem("funcionarios", JSON.stringify(dados));
      })
      .catch(error => {
        console.error("Erro ao buscar dados online:", error);
        let locais = JSON.parse(localStorage.getItem("funcionarios")) || [];
        mostrar(locais);
      });
  }

  function cadastrar(event) {
    event.preventDefault();

    let nome = document.getElementById("nome").value;
    let email = document.getElementById("email").value;
    let cpf = document.getElementById("cpf").value;

    // Criando o formato de dados correto para evitar problemas de bloqueio (CORS)
    let dadosFormulario = new URLSearchParams();
    dadosFormulario.append("nome", nome);
    dadosFormulario.append("email", email);
    dadosFormulario.append("cpf", cpf);

    fetch(URL_PLANILHA, {
      method: "POST",
      body: dadosFormulario,
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      }
    })
    .then(() => {
      alert("Funcionário cadastrado com sucesso!");
      event.target.reset();
      setTimeout(carregarDadosDaPlanilha, 1500); 
    })
    .catch(error => {
      console.error("Erro ao enviar dados:", error);
      alert("Erro ao conectar com a nuvem, verifique a publicação do script.");
    });
  }

  function mostrar(lista) {
    let div = document.getElementById("lista");
    div.innerHTML = "";

    if (!lista || lista.length === 0) {
      div.innerHTML = "<p style='color: #888;'>Nenhum funcionário registrado.</p>";
      return;
    }

    lista.forEach(f => {
      div.innerHTML += `
        <div class="card">
          <strong>Nome:</strong> ${f.nome}<br>
          <strong>Email:</strong> ${f.email}<br>
          <strong>CPF:</strong> ${f.cpf}
        </div>
      `;
    });
  }

  function buscar() {
    let texto = document.getElementById("busca").value.toLowerCase();
    let funcionarios = JSON.parse(localStorage.getItem("funcionarios")) || [];

    let filtrados = funcionarios.filter(f =>
      (f.nome && f.nome.toLowerCase().includes(texto)) ||
      (f.email && f.email.toLowerCase().includes(texto)) ||
      (f.cpf && f.cpf.includes(texto))
    );

    mostrar(filtrados);
  }

  carregarDadosDaPlanilha();
</script>

<footer>
  <p>&copy; 2026 - Mateus Filipe 202.</p>
</footer>

</body>
</html>
